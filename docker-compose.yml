services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: project_management
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d project_management"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/project_management
      AUTH_SECRET: local-docker-dev-secret-change-me
      AUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: local-docker-dev-secret-change-me
      NEXTAUTH_URL: http://localhost:3000
      AUTH_DEMO_EMAIL: admin@example.com
      AUTH_DEMO_PASSWORD: password
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "npm run db:generate &&
             npm run db:push &&
             npm run db:seed &&
             npm run dev:docker"

volumes:
  postgres_data:
  app_node_modules:
